name: Repository Checks

on:
  push:
    branches: [ "main" ]
    tags:
      - "v*"
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

# Release assets are produced by scripts/Release-Version.ps1. GitHub-hosted
# runners cannot build TCAMP.dll from a clean checkout because the required game,
# Unity, and BepInEx reference DLLs are local-only and intentionally not in git.
jobs:
  publishable:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Check publishable contents
      shell: pwsh
      run: ./scripts/AssertPublishable.ps1

    - name: Validate release tag flow
      if: startsWith(github.ref, 'refs/tags/v')
      shell: pwsh
      run: |
        Write-Host "Release tag detected: $env:GITHUB_REF_NAME"
        Write-Host "Release assets must be built and uploaded by scripts/Release-Version.ps1."
        Write-Host "This repository intentionally does not store the Tiny Combat Arena, Unity, or BepInEx reference DLLs needed for CI builds."
