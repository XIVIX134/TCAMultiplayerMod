name: Build & Release

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*' # Trigger on tags starting with v (e.g. v1.0, v1.0-preview)
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 6.0.x

    - name: Restore dependencies
      run: dotnet restore TCAMultiplayer.sln

    - name: Build
      run: dotnet build TCAMultiplayer.sln --configuration Release --no-restore

    # Zip the DLL for release
    - name: Zip Release
      run: |
        cd src/bin/Release/net472
        powershell Compress-Archive -Path TCAMultiplayer.dll -DestinationPath TCAMultiplayer.zip

    # Upload Artifact (for every commit)
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TCAMultiplayer-DLL
        path: src/bin/Release/net472/TCAMultiplayer.dll

    # Create Release (ONLY for tags)
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: src/bin/Release/net472/TCAMultiplayer.zip
        prerelease: ${{ contains(github.ref, 'preview') || contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

